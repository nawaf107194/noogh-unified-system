missing_feature: |
  You are improving an autonomous Artificial Intelligence system (NOOGH). Suggest ONE new feature to add to the system architecture.
  
  CURRENT SYSTEM CAPABILITIES:
  {capabilities}
  
  RECENT SYSTEM CHANGES:
  {recent_changes}
  
  ALREADY IMPLEMENTED (DO NOT REPEAT):
  {already_implemented}
  
  The system currently has core elements like:
  - Neural Engine: LLM inference (vLLM, RunPod, local Ollama)
  - Evolution Pipeline: Generates, tests, and promotes new code (InnovationEngine)
  - Memory: SQLite-based MemoryStore, JSON-based Instincts, Cognitive Journal
  - Gateway: FastAPI endpoints for interaction
  - Data Routing: Postgres/VectorDB routing
  
  Think about NEXT LEVEL improvements NOT yet implemented:
  - Autonomous System Administrator (self-healing infra, auto-restart)
  - Advanced Memory Summarization (compressing old episodic memories)
  - Resource governor (throttling brain calls when GPU/CPU is saturated)
  - Goal synthesis (agent generating its own long-term objectives based on environment)
  - Security Intrusion Detection (analyzing logs to block suspicious IPs)
  - Multi-agent collaboration (spawning sub-agents for parallel tasks)
  - Code Quality Linter (automatically fixing PEP8 or typing issues)
  - Emotional/State tracking (agent modifying behavior based on recent failure/success streaks)
  
  CRITICAL: Create the new feature as a NEW FILE in: unified_core/intelligence/ (for thought/reasoning features) OR unified_core/system/ (for infra features).
  
  CRITICAL ARCHITECTURE RULES:
  1. DO NOT use mock data. If data is needed, connect to real DB tools (e.g. DataRouter) or fetch real data.
  2. NEVER put execution code at the module level. If writing examples/tests, MUST wrap them in `if __name__ == '__main__':`
  3. DO NOT reinvent the wheel. Use existing system interfaces.
  
  OUTPUT FORMAT:
  ```json
  {{
      "title": "Feature name",
      "description": "What it does and why it improves trading",
      "target_file": "unified_core/intelligence/new_feature.py",
      "rationale": "How this reduces losses or increases win rate"
  }}
  ```
  
  Then provide the complete implementation:
  ```python
  # Your code here
  ```

bug_hunter: |
  Review this Python function for potential bugs, edge cases, and security issues.
  
  FILE: {file_path}
  FUNCTION: {function_name}
  
  ```python
  {code}
  ```
  
  Look for:
  1. Unhandled exceptions that could crash the process
  2. Race conditions in async code
  3. Missing input validation
  4. Resource leaks (unclosed files, sessions, connections)
  5. Logic errors in edge cases
  
  If you find a real bug, provide:
  ```json
  {{
      "title": "Bug: description",
      "severity": "HIGH/MEDIUM/LOW",
      "description": "Detailed explanation",
      "fix_description": "How to fix it"
  }}
  ```
  
  Then provide the FIXED version of the SAME function. CRITICAL RULES:
  - Keep the EXACT same function signature: `def {function_name}(...)`
  - Do NOT wrap in a class, do NOT add imports or module-level code
  - Only modify the function BODY to fix the bug
  - Return ONLY the complete fixed function definition, nothing else
  
  ```python
  def {function_name}(...):  # Same signature as original
      # Fixed body here
  ```
  
  If no real bugs found, respond with: NO_BUGS_FOUND

test_generator: |
  Generate a comprehensive unit test for this function.
  
  FILE: {file_path}
  FUNCTION: {function_name}
  
  ```python
  {code}
  ```
  
  Generate tests that cover:
  1. Happy path (normal inputs)
  2. Edge cases (empty, None, boundaries)
  3. Error cases (invalid inputs) ONLY IF the code explicitly raises them
  4. Async behavior (if applicable)
  
  CRITICAL RULES FOR TESTS:
  1. DO NOT assume the target system raises specific exceptions (like `ValueError` or `TypeError`) unless the code explicitly contains a `raise` statement or you're confident a standard library function will raise it. It's better to assert the result is None or False than to falsely assert a fake exception.
  2. DO NOT rewrite or mock the target behavior internally. Import the real class/function and test its actual outputs.
  3. NEVER put execution code at the module level outside tests.
  
  Use pytest style. Output ONLY the test code:
  ```python
  import pytest
  # Your tests here
  ```

architecture_review: |
  Review this module's architecture and suggest ONE structural improvement.
  
  MODULE: {module_name}
  FILES:
  {file_list}
  
  CURRENT PATTERNS:
  {patterns}
  
  ALREADY IMPLEMENTED (DO NOT REPEAT):
  {already_implemented}
  
  Consider:
  - Is there duplicated logic that should be extracted?
  - Are there circular dependencies?
  - Could a design pattern (Factory, Observer, Strategy) simplify the code?
  - What abstraction layer is missing?
  - AVOID: error handlers, logging wrappers, health checks (already saturated)
  
  CRITICAL ARCHITECTURE RULES:
  1. DO NOT use mock data. Connect to real DB tools (e.g. DataRouter) or real APIs.
  2. NEVER put execution code at the module level. Tests/examples MUST be in `if __name__ == '__main__':`
  3. BUILD on existing components, do not reinvent connections or clients.
  
  OUTPUT:
  ```json
  {{
      "title": "Improvement name",
      "description": "What to change and why",
      "target_file": "which file to modify or create",
      "pattern": "Which design pattern to apply"
  }}
  ```
  
  Then provide the implementation:
  ```python
  # Your code here
  ```

deep_refactor: |
  You are an expert Python engineer and a core component of the NOOGH autonomous AI system.
  Your task is to perform a DEEP REFACTOR on the provided existing Python file.
  
  Unlike other innovation types that create new files, this prompt is specifically for MODIFYING EXISTING code IN-PLACE to make it better, faster, or more robust.
  
  FILE: {file_path}
  
  CURRENT FILE CONTENT:
  ```python
  {file_content}
  ```
  
  INSTRUCTIONS:
  1. Carefully read the `CURRENT FILE CONTENT`.
  2. Identify weak points such as:
     - Missing explicit error handling (e.g., catching specific exceptions instead of bare `except:`).
     - Inefficient loops, algorithms, or I/O operations.
     - Hardcoded values that should be configurable or dynamic.
     - Unsafe parsing or casting operations.
     - Poor documentation or missing type hints.
  3. Rewrite the code to fix these issues. Your refactored code should be a complete, drop-in replacement for the original file.
  
  CRITICAL RULES:
  1. DO NOT change the core purpose or external API of the file, as other parts of the system rely on it.
  2. Maintain all existing imports unless you are specifically removing unused ones.
  3. Ensure your refactored code is syntactically valid Python.
  4. Your output MUST be the FULL ENTIRE FILE rewritten, not just a snippet.
  
  OUTPUT FORMAT:
  First, provide a JSON block with the metadata:
  ```json
  {{
      "title": "Brief title of the refactor",
      "description": "What was improved and why"
  }}
  ```
  
  Then, provide the FULL REFACTORED CODE in a python block:
  ```python
  # COMPLETE REWRITTEN FILE CONTENT HERE
  ```


