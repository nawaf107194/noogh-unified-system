name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.10'

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
      
      - name: Run black (format check)
        run: black --check gateway/
      
      - name: Run isort (import sorting)
        run: isort --check-only gateway/
      
      - name: Run flake8 (linting)
        run: flake8 gateway/ --max-line-length=100 --ignore=E203,W503
      
      - name: Run mypy (type checking)
        run: mypy gateway/ --ignore-missing-imports
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install bandit
        run: pip install bandit
      
      - name: Run bandit (security scan)
        run: bandit -r gateway/ -ll
      
      - name: Check for hardcoded paths
        run: |
          echo "Checking for hardcoded paths..."
          ! grep -r '/app/data\|\\./data/' gateway/app/core gateway/app/ml --include="*.py" || exit 1
          echo "No hardcoded paths found!"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Set up test environment
        run: |
          mkdir -p /tmp/noogh_test_data
          echo "NOOGH_DATA_DIR=/tmp/noogh_test_data" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379/0" >> $GITHUB_ENV
          echo "NOOGH_JOB_SIGNING_SECRET=test-secret-minimum-32-characters-long" >> $GITHUB_ENV
          echo "NOOGH_ADMIN_TOKEN=test-admin-token" >> $GITHUB_ENV
      
      - name: Run tests
        run: |
          cd /home/noogh/projects/noogh_unified_system/src
          pytest gateway/app/tests -v --cov=gateway --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        run: |
          docker build -t noogh-gateway:${{ github.sha }} .
      
      - name: Test Docker image
        run: |
          docker run --rm noogh-gateway:${{ github.sha }} python -c "import gateway.app.main; print('OK')"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to staging
        run: |
          echo "Deploying to staging server..."
          # Add actual deployment script here
          # ssh staging "cd /opt/noogh && git pull && sudo systemctl restart noogh-gateway"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy to production
        run: |
          echo "Deploying to production server..."
          # Add actual deployment script here
          # Require manual approval in GitHub environment settings
