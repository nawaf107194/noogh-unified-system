# The Unified Core - Docker Compose Configuration

version: '3.8'

services:
  # PostgreSQL for logical/mathematical data
  postgres:
    image: postgres:16-alpine
    container_name: unified-core-postgres
    environment:
      POSTGRES_DB: unified_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unified_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unified-net

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: unified-core-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unified-net

  # Milvus for vector storage
  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: unified-core-milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    networks:
      - unified-net

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: unified-core-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    networks:
      - unified-net

  minio:
    image: minio/minio:latest
    container_name: unified-core-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - minio_data:/minio_data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - unified-net

  # Neo4j for graph relationships
  neo4j:
    image: neo4j:5-community
    container_name: unified-core-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-unified_secret}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - unified-net

  # The Unified Core Application
  unified-core:
    build:
      context: .
      dockerfile: Dockerfile.unified
    container_name: unified-core-app
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: unified_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unified_secret}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-unified_secret}
      BROKER_ROUTER_PORT: 5555
      BROKER_PUB_PORT: 5556
      GPU_ENABLED: "true"
      LLM_MODEL: mistralai/Mistral-7B-Instruct-v0.1
    ports:
      - "5555:5555" # ZeroMQ Router
      - "5556:5556" # ZeroMQ Pub
      - "8080:8080" # API (if added)
    volumes:
      - ./data:/app/data
      - unified_models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_started
      neo4j:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    networks:
      - unified-net

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  neo4j_data:
  unified_models:


networks:
  unified-net:
    driver: bridge
